services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments -d payments"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: local
      POSTGRES_URI: postgresql+asyncpg://payments:payments@postgres:5432/payments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: dev-api-key-change-me
    command: alembic upgrade head

  api:
    build:
      context: .
      target: api
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      ENVIRONMENT: local
      POSTGRES_URI: postgresql+asyncpg://payments:payments@postgres:5432/payments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: dev-api-key-change-me
      OUTBOX_POLL_INTERVAL_SEC: 1
    ports:
      - "8000:8000"

  consumer:
    build:
      context: .
      target: consumer
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      ENVIRONMENT: local
      POSTGRES_URI: postgresql+asyncpg://payments:payments@postgres:5432/payments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      API_KEY: dev-api-key-change-me
      WEBHOOK_MAX_RETRIES: 3
      WEBHOOK_RETRY_BASE_DELAY_SEC: 1
